<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#E91E8C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <title>Workout Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=20" />
</head>
<body>
  <div id="app">
    <div id="main-view" class="view"></div>

    <!-- Rest timer (persistent overlay above tab bar) -->
    <div id="rest-timer" class="hidden"></div>

    <!-- Bottom tab bar -->
    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Home
      </button>
      <button class="tab-btn" data-tab="workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5h11M6.5 17.5h11M12 2v20"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Workout
      </button>
<button class="tab-btn" data-tab="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        History
      </button>
    </nav>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Sync status dot -->
  <div id="sync-dot"></div>

  <!-- Scripts (order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="exercises.js?v=20"></script>
  <script src="illustrations.js?v=20"></script>
  <script src="db.js?v=20"></script>
  <script src="supabase.js?v=20"></script>
  <script src="app.js?v=20"></script>
</body>
</html>
